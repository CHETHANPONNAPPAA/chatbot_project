<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="styles.css">

<style>
/* Center login */
.login-container {
  width: 350px;
  backdrop-filter: blur(18px);
  background: rgba(30, 58, 138, 0.35);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* Title */
.login-title {
  text-align: center;
  color: white;
  font-size: 24px;
  font-weight: bold;
}

/* Inputs */
.login-container input {
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* Buttons */
.login-btn {
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

/* Login button */
.login {
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: white;
}

.login:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #7c3aed;
}

/* Register button */
.register {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: #e5e7eb;
}

.register:hover {
  background: rgba(255,255,255,0.1);
}

/* Footer */
.login-footer {
  text-align: center;
  color: #9ca3af;
  font-size: 12px;
}
</style>

</head>

<body>

<div class="login-container">
    <div class="login-title">🔐 AI Chat Login</div>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button class="login-btn login" onclick="login()">Login</button>
    <button class="login-btn register" onclick="register()">Create Account</button>

    <div class="login-footer">
        Secure access to your chatbot
    </div>
</div>

<script>
const API = "https://chatbot-project-htzx.onrender.com";

function login() {
    fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            localStorage.setItem("user", username.value);
            window.location.href = "index.html";
        } else {
            alert("Invalid login ❌");
        }
    });
}

function register() {
    fetch(API + "/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}
</script>

</body>
</html>
